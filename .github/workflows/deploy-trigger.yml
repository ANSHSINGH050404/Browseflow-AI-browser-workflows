name: Deploy Trigger

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-trigger-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy Trigger.dev workers
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Deploy tasks
        env:
          # Personal Access Token from Trigger.dev (Account → Access Tokens).
          # Repo secret: TRIGGER_ACCESS_TOKEN
          TRIGGER_ACCESS_TOKEN: ${{ secrets.TRIGGER_ACCESS_TOKEN }}
        run: npx trigger.dev@4.5.3 deploy --env prod
