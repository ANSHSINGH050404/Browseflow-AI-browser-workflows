name: CI

on:
  pull_request:
  push:
    branches: ["**"]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Typecheck, lint, build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      # Placeholder values so `next build` can resolve modules without real secrets.
      # Real keys live in Vercel / Trigger dashboards, not in CI.
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_ci_placeholder
      CLERK_SECRET_KEY: sk_test_ci_placeholder
      NEXT_PUBLIC_CLERK_SIGN_IN_URL: /sign-in
      NEXT_PUBLIC_CLERK_SIGN_UP_URL: /sign-up
      NEXT_PUBLIC_CLERK_SIGN_IN_FALLBACK_REDIRECT_URL: /app
      NEXT_PUBLIC_CLERK_SIGN_UP_FALLBACK_REDIRECT_URL: /app
      DATABASE_URL: postgresql://ci:ci@127.0.0.1:5432/ci
      DATABASE_URL_UNPOOLED: postgresql://ci:ci@127.0.0.1:5432/ci
      TRIGGER_SECRET_KEY: tr_dev_ci_placeholder
      NEXT_PUBLIC_LIVEBLOCKS_PUBLIC_KEY: pk_ci_placeholder
      LIVEBLOCKS_SECRET_KEY: sk_ci_placeholder
      BROWSERBASE_API_KEY: bb_ci_placeholder
      CI: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
